<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Architecture Diagram Generator</title>
    <!-- Tailwind CSS for styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    
    <!-- Mermaid.js for rendering diagrams -->
    <script type="module">
        import mermaid from 'https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.esm.min.mjs';
        mermaid.initialize({ 
            startOnLoad: false,
            theme: 'dark',
            themeVariables: {
                primaryColor: '#1e293b',
                primaryTextColor: '#f8fafc',
                primaryBorderColor: '#3b82f6',
                lineColor: '#64748b',
                secondaryColor: '#334155',
                tertiaryColor: '#1e293b'
            },
            fontFamily: 'Inter, sans-serif'
        });
        window.mermaid = mermaid;
    </script>
    <!-- Phosphor Icons for UI elements -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>

    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0f172a; /* slate-900 */
            color: #f8fafc; /* slate-50 */
        }
        
        /* Custom scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        ::-webkit-scrollbar-track {
            background: transparent; 
        }
        ::-webkit-scrollbar-thumb {
            background: #334155; /* slate-700 */
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #475569; /* slate-600 */
        }
        
        /* Smooth transitions */
        .transition-all-custom {
            transition: all 0.2s ease-in-out;
        }
    </style>
</head>

<body class="h-screen flex flex-col overflow-hidden">
    <!-- Top Navigation Bar -->
    <header class="h-14 flex items-center justify-between px-6 shrink-0 border-b border-slate-800 bg-slate-900/50">
        <div class="flex items-center gap-3">
            <i class="ph ph-tree-structure text-blue-500 text-xl"></i>
            <h1 class="text-sm font-medium text-slate-200">Architecture Diagram Generator</h1>
        </div>
        <div class="flex items-center gap-2 text-xs text-slate-400">
            <span class="w-2 h-2 rounded-full bg-emerald-500"></span>
            <span id="status-text">Backend Ready</span>
        </div>
    </header>

    <!-- Main Content Split -->
    <main class="flex-1 flex flex-col md:flex-row h-[calc(100vh-3.5rem)]">
        <!-- Left Panel: Input -->
        <section class="w-full md:w-[450px] flex-none flex flex-col border-r border-slate-800 bg-slate-900">
            <div class="p-5 pb-3 flex items-center justify-between">
                <div class="flex items-center gap-2 text-sm font-medium text-slate-300">
                    <i class="ph ph-text-align-left text-slate-400"></i>
                    <span>Description</span>
                </div>
            </div>

            <!-- Text Area -->
            <div class="flex-1 px-5 flex flex-col gap-4 overflow-y-auto">
               <textarea
                    id="description-input"
                    class="flex-1 min-h-[200px] w-full bg-slate-800 border border-slate-700 text-slate-200 p-4 rounded-lg resize-none focus:outline-none focus:border-blue-500 transition-all-custom font-mono text-sm leading-relaxed placeholder:text-slate-500"
                    placeholder="Enter your architecture description here...&#10;&#10;For example: A React frontend sends requests to a Node API, which reads from a PostgreSQL database."
                ></textarea>
                
                <!-- Presets -->
                <div class="flex flex-col gap-2 pb-2">
                    <span class="text-xs text-slate-500 font-medium">Examples</span>
                    <div class="flex flex-wrap gap-2">
                        <button onclick="loadPreset('microservices')" class="px-3 py-1.5 bg-slate-800 border border-slate-700 hover:border-slate-500 hover:bg-slate-700 text-xs text-slate-300 rounded transition-all-custom">
                            Microservices
                        </button>
                        <button onclick="loadPreset('serverless')" class="px-3 py-1.5 bg-slate-800 border border-slate-700 hover:border-slate-500 hover:bg-slate-700 text-xs text-slate-300 rounded transition-all-custom">
                            Serverless
                        </button>
                    </div>
                </div>
            </div>

            <!-- Generate Button -->
            <div class="p-5 border-t border-slate-800 bg-slate-900">
                <button 
                    id="generate-btn"
                    onclick="generateDiagram()"
                    class="w-full bg-blue-600 hover:bg-blue-700 text-white font-medium py-3 px-4 rounded-lg flex items-center justify-center gap-2 transition-all-custom focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-offset-2 focus:ring-offset-slate-900"
                >
                    <i class="ph ph-play text-lg"></i>
                    <span>Generate Diagram</span>
                </button>
            </div>
        </section>

        <!-- Right Panel: Output Workspace -->
        <section class="flex-1 flex flex-col overflow-hidden bg-slate-950 relative">
            <!-- Output Toolbar -->
            <div class="h-12 border-b border-slate-800 flex items-center justify-between px-4 bg-slate-900/50">
                <div class="flex items-center gap-2">
                    <!-- Toggle Switch -->
                    <div class="flex bg-slate-800 rounded p-1">
                        <button id="view-diagram-btn" onclick="toggleView('diagram')" class="px-3 py-1 text-sm font-medium rounded bg-slate-700 text-slate-100 transition-all-custom">Preview</button>
                        <button id="view-code-btn" onclick="toggleView('code')" class="px-3 py-1 text-sm font-medium rounded text-slate-400 hover:text-slate-200 transition-all-custom">Code</button>
                    </div>
                </div>
                
                <div class="flex items-center gap-2">
                    <button onclick="copyCode()" class="flex items-center gap-1.5 px-3 py-1.5 text-sm text-slate-300 bg-slate-800 hover:bg-slate-700 rounded transition-all-custom">
                        <i class="ph ph-copy"></i>
                        <span>Copy</span>
                    </button>
                    <button onclick="exportSVG()" class="flex items-center gap-1.5 px-3 py-1.5 text-sm text-slate-300 bg-slate-800 hover:bg-slate-700 rounded transition-all-custom">
                        <i class="ph ph-download-simple"></i>
                        <span>Export SVG</span>
                    </button>
                </div>
            </div>

            <!-- Workspace Area -->
            <div class="flex-1 relative overflow-auto p-6 flex items-center justify-center">
                
                <!-- Initial Empty State -->
                <div id="empty-state" class="absolute inset-0 flex flex-col items-center justify-center text-slate-500">
                    <i class="ph ph-image text-4xl mb-3 text-slate-700"></i>
                    <p class="text-sm">Your diagram will appear here</p>
                </div>

                <!-- Loading State -->
                <div id="loading-state" class="hidden absolute inset-0 flex flex-col items-center justify-center bg-slate-950 z-20">
                    <i class="ph ph-circle-notch text-4xl text-blue-500 animate-spin mb-4"></i>
                    <p class="text-sm text-slate-400">Generating diagram...</p>
                </div>

                <!-- Visual Diagram Container -->
                <div id="diagram-container" class="hidden w-full h-full flex items-center justify-center">
                    <div id="mermaid-output" class="w-full h-full flex items-center justify-center"></div>
                </div>

                <!-- Raw Code Editor Container -->
                <div id="code-container" class="hidden w-full h-full">
                    <textarea
                        id="raw-code-output" 
                        class="w-full h-full bg-slate-900 border border-slate-700 rounded p-5 text-sm text-slate-300 font-mono resize-none focus:outline-none focus:border-blue-500"
                        spellcheck="false"
                        oninput="debounceRender()"
                    ></textarea>
                </div>
            </div>
        </section>
    </main>

    <script>
        let currentMermaidCode = "";
        let currentView = 'diagram';
        let renderTimeout;
        const API_URL = window.location.hostname === "localhost" || window.location.hostname === "127.0.0.1"
            ? "http://localhost:8000/generate" 
            : "https://diagram-backend-z0gm.onrender.com/generate";

        const presets = {
            microservices: "A client application communicates with an API Gateway. The API Gateway routes requests to three separate microservices: User Service, Product Service, and Order Service. Each microservice has its own dedicated database (User DB, Product DB, Order DB). The microservices also publish events to a Kafka Event Bus for asynchronous processing.",
            serverless: "A user uploads an image to an Amazon S3 bucket. This triggers an AWS Lambda function. The Lambda function resizes the image and saves the thumbnail to a different S3 bucket. It also extracts metadata and saves it to Amazon DynamoDB. Finally, it sends a notification via Amazon SNS to alert subscribers."
        };

        function loadPreset(key) {
            const input = document.getElementById('description-input');
            input.value = presets[key];
        }

        function toggleView(view) {
            currentView = view;
            const diagramBtn = document.getElementById('view-diagram-btn');
            const codeBtn = document.getElementById('view-code-btn');
            const diagramContainer = document.getElementById('diagram-container');
            const codeContainer = document.getElementById('code-container');

            if (view === 'diagram') {
                diagramBtn.className = "px-3 py-1 text-sm font-medium rounded bg-slate-700 text-slate-100 transition-all-custom";
                codeBtn.className = "px-3 py-1 text-sm font-medium rounded text-slate-400 hover:text-slate-200 transition-all-custom";
                
                codeContainer.classList.add('hidden');
                diagramContainer.classList.remove('hidden');
                
                renderDiagram(document.getElementById('raw-code-output').value);
            } else {
                codeBtn.className = "px-3 py-1 text-sm font-medium rounded bg-slate-700 text-slate-100 transition-all-custom";
                diagramBtn.className = "px-3 py-1 text-sm font-medium rounded text-slate-400 hover:text-slate-200 transition-all-custom";
                
                diagramContainer.classList.add('hidden');
                codeContainer.classList.remove('hidden');
                
                document.getElementById('raw-code-output').value = currentMermaidCode;
            }
        }

        function debounceRender() {
            clearTimeout(renderTimeout);
            renderTimeout = setTimeout(() => {
                currentMermaidCode = document.getElementById('raw-code-output').value;
            }, 500);
        }

        async function renderDiagram(code) {
            const outputDiv = document.getElementById('mermaid-output');
            
            try {
                outputDiv.innerHTML = '';
                const id = 'diagram-' + Date.now();
                const { svg } = await window.mermaid.render(id, code);
                
                outputDiv.innerHTML = svg;
                
                const svgElement = outputDiv.querySelector('svg');
                if(svgElement) {
                    svgElement.style.width = '100%';
                    svgElement.style.height = '100%';
                    svgElement.style.maxHeight = '100%';
                }

            } catch (error) {
                console.error("Mermaid parsing error:", error);
                outputDiv.innerHTML = `<div class="text-red-400 bg-red-950/30 p-4 rounded border border-red-900/50 font-mono text-sm whitespace-pre-wrap">${error.message || 'Syntax error in generated code.'}</div>`;
            }
        }

        async function generateDiagram() {
            const input = document.getElementById('description-input').value.trim();
            if (!input) return;

            // UI Updates
            document.getElementById('empty-state').classList.add('hidden');
            document.getElementById('diagram-container').classList.add('hidden');
            document.getElementById('code-container').classList.add('hidden');
            
            const loader = document.getElementById('loading-state');
            loader.classList.remove('hidden');
            
            const btn = document.getElementById('generate-btn');
            const originalBtnHtml = btn.innerHTML;
            btn.disabled = true;
            btn.classList.add('opacity-70', 'cursor-not-allowed');
            btn.innerHTML = '<i class="ph ph-circle-notch animate-spin text-lg"></i><span>Generating...</span>';

            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ description: input })
                });

                if (!response.ok) {
                    throw new Error(`Server responded with status ${response.status}`);
                }

                const data = await response.json();
                
                if (data.mermaid_code) {
                    currentMermaidCode = data.mermaid_code;
                    document.getElementById('raw-code-output').value = currentMermaidCode;
                    
                    loader.classList.add('hidden');

                    if (currentView === 'diagram') {
                        await renderDiagram(currentMermaidCode);
                        document.getElementById('diagram-container').classList.remove('hidden');
                    } else {
                        document.getElementById('code-container').classList.remove('hidden');
                    }
                } else {
                    throw new Error("Invalid response format from server.");
                }

            } catch (error) {
                console.error("Error generating diagram:", error);
                loader.classList.add('hidden');
                
                const emptyState = document.getElementById('empty-state');
                emptyState.classList.remove('hidden');
                emptyState.innerHTML = `<div class="text-red-400 text-center"><i class="ph ph-warning-circle text-3xl mb-2"></i><p class="font-medium">Connection Error</p><p class="text-xs mt-1 text-red-300/80">${error.message}</p></div>`;
            } finally {
                btn.disabled = false;
                btn.classList.remove('opacity-70', 'cursor-not-allowed');
                btn.innerHTML = originalBtnHtml;
            }
        }

        async function copyCode() {
            if (!currentMermaidCode) return;
            try {
                await navigator.clipboard.writeText(currentMermaidCode);
                const btn = event.currentTarget;
                const originalHtml = btn.innerHTML;
                btn.innerHTML = '<i class="ph ph-check text-green-500"></i><span class="text-green-500">Copied</span>';
                setTimeout(() => btn.innerHTML = originalHtml, 2000);
            } catch (err) {
                console.error('Failed to copy: ', err);
            }
        }

        function exportSVG() {
            const svgElement = document.querySelector('#mermaid-output svg');
            if (!svgElement) return;

            const serializer = new XMLSerializer();
            let source = serializer.serializeToString(svgElement);

            if(!source.match(/^<svg[^>]+xmlns="http\:\/\/www\.w3\.org\/2000\/svg"/)){
                source = source.replace(/^<svg/, '<svg xmlns="http://www.w3.org/2000/svg"');
            }
            if(!source.match(/^<svg[^>]+"http\:\/\/www\.w3\.org\/1999\/xlink"/)){
                source = source.replace(/^<svg/, '<svg xmlns:xlink="http://www.w3.org/1999/xlink"');
            }

            source = '<?xml version="1.0" standalone="no"?>\r\n' + source;
            const url = "data:image/svg+xml;charset=utf-8,"+encodeURIComponent(source);

            const downloadLink = document.createElement("a");
            downloadLink.href = url;
            downloadLink.download = "architecture-diagram.svg";
            document.body.appendChild(downloadLink);
            downloadLink.click();
            document.body.removeChild(downloadLink);
        }
    </script>
</body>
</html>
